  docman-opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: docman-opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      - OPENSEARCH_HOSTS=["https://docman-opensearch-node1:9200"]
    networks:
      - docman-network

networks:
  docman-network:
    driver: bridge
    name: docman-network

volumes:
  opensearch-data:
  #opensearch-data2:
  mongo_data:
  minio-volume:
    driver: local