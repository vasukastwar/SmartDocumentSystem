name: "docman-ai"
services:
  docman-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: docman-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181

  docman-kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: docman-kafka
    depends_on:
      - docman-zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: docman-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  docman-temporal-db:
    image: postgres:${POSTGRESQL_VERSION}
    container_name: docman-temporal-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_USER}
      POSTGRES_USER: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/postgresql/data
    networks:
      - docman-network

  docman-db:
    image: mongo:latest
    container_name: docman-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  docman-temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: docman-temporal
    ports:
      - "7233:7233"      # gRPC service
      - "8088:8088"      # Web UI
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7233" ]
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s
    environment:
      - PERSISTENCE_TYPE=sql
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=${POSTGRES_SEEDS}
    depends_on:
      - docman-temporal-db
    networks:
      - docman-network

  docman-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMIN_VERSION}
    container_name: docman-admin-tools
    depends_on:
      - docman-temporal
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - docman-network
    stdin_open: true
    tty: true

  docman-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: docman-ui
    ports:
      - "8080:8080"
    environment:
      - "TEMPORAL_ADDRESS=docman-temporal:7233"
      - "TEMPORAL_CORS_ORIGINS=http://localhost:3000"
    depends_on:
      - docman-temporal
    networks:
      - docman-network

  docman-minio:
    image: minio/minio
    container_name: docman-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
      - MINIO_DEFAULT_BUCKETS=documents
    networks:
      - docman-network
    volumes:
      - minio-volume:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]

  docman-opensearch-node1:
    image: opensearchproject/opensearch:latest
    container_name: docman-opensearch-node1
    environment:
      - cluster.name=docman-opensearch-cluster
      - node.name=docman-opensearch-node1
      - discovery.seed_hosts=docman-opensearch-node1
      - cluster.initial_cluster_manager_nodes=docman-opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=SecureP@ssword1
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - docman-network

